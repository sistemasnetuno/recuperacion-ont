<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistema de Registro ONT</title>
  <style>
    /* Reset global para control absoluto del ancho en móviles */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg-dark: #2c3e50; 
      --surface: #34495e; 
      --primary: #00f2fe;
      --primary-glow: rgba(0, 242, 254, 0.4);
      --secondary: #4facfe;
      --text: #ecf0f1;
      --border: #465c71;
      --error: #ff6b6b;
      --success: #20c997;
      --warning: #fbc531;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: var(--bg-dark);
      background-image: 
        radial-gradient(circle at 15% 50%, rgba(0, 242, 254, 0.08), transparent 25%),
        radial-gradient(circle at 85% 30%, rgba(79, 172, 254, 0.08), transparent 25%);
      color: var(--text);
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }

    .logo-container {
      width: 100%;
      text-align: center;
      margin-bottom: 20px;
      margin-top: 10px;
    }
    
    .logo-container img {
      width: 100%;
      max-width: 240px;
      height: auto;
      filter: drop-shadow(0 0 10px rgba(255,255,255,0.1));
    }

    .container {
      width: 100%;
      max-width: 750px;
    }

    .card {
      background: var(--surface);
      padding: 30px;
      border-radius: 12px;
      border: 1px solid var(--border);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
      margin-bottom: 20px;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 3px;
      background: linear-gradient(90deg, var(--secondary), var(--primary));
      box-shadow: 0 0 10px var(--primary);
    }

    h2 { 
      color: var(--primary); 
      margin-bottom: 20px;
      font-size: 22px;
      text-shadow: 0 0 5px rgba(0,0,0,0.3);
    }

    h3 {
      color: var(--text);
      font-size: 16px;
      margin-bottom: 15px;
      border-left: 3px solid var(--secondary);
      padding-left: 8px;
    }
    
    .hidden { display: none !important; }
    
    .form-group { margin-bottom: 20px; }
    label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 14px; letter-spacing: 0.5px; }
    
    input[type="text"], input[type="password"], input[type="number"], select, textarea {
      width: 100%;
      padding: 12px;
      background-color: rgba(255, 255, 255, 0.07);
      border: 1px solid var(--border);
      color: #fff;
      border-radius: 6px;
      font-family: inherit;
      font-size: 15px;
      transition: all 0.3s ease;
    }
    
    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 8px var(--primary-glow);
      background-color: rgba(255, 255, 255, 0.12);
    }

    /* ==========================================
       CORRECCIÓN PARA OPCIONES DEL SELECT
       ========================================== */
    select option {
      background-color: #34495e; /* Fondo oscuro y sólido */
      color: #ffffff; /* Texto blanco */
    }

    /* Grupo de cédula y búsquedas con flexibilidad inteligente */
    .input-group { 
      display: flex; 
      gap: 10px; 
    }
    .input-group select { 
      width: 90px; 
      flex-shrink: 0; 
    }
    .input-group input {
      flex-grow: 1;
    }
    
    button {
      background: linear-gradient(90deg, var(--secondary), var(--primary));
      color: #000;
      border: none;
      padding: 14px 20px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 15px;
      font-weight: bold;
      width: 100%;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 15px var(--primary-glow);
    }
    
    button:hover { 
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(0, 242, 254, 0.5);
    }
    
    button:disabled { 
      background: #5a6c7d !important; 
      color: #b0bec5 !important;
      box-shadow: none !important;
      cursor: not-allowed; 
      transform: none !important;
    }
    
    .header-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 30px;
    }

    .header-actions {
      display: flex;
      gap: 10px;
    }
    
    .btn-small { width: auto; background: transparent; border: 1px solid var(--error); color: var(--error); box-shadow: none; padding: 8px 16px; font-size: 14px;}
    .btn-small:hover { background: var(--error); color: #fff; box-shadow: 0 0 10px rgba(255,107,107,0.3); }
    
    .btn-success { background: transparent; border: 1px solid var(--success); color: var(--success); width: auto; box-shadow: none; padding: 8px 16px; font-size: 14px;}
    .btn-success:hover { background: var(--success); color: #000; box-shadow: 0 0 10px rgba(32,201,151,0.3); }

    #mensaje { 
      text-align: center; 
      font-weight: bold; 
      margin-bottom: 20px; 
      padding: 12px;
      border-radius: 6px;
      display: none;
      font-size: 14px;
    }
    .success { background: rgba(32, 201, 151, 0.1); color: var(--success); border: 1px solid var(--success); display: block !important; }
    .error { background: rgba(255, 107, 107, 0.1); color: var(--error); border: 1px solid var(--error); display: block !important; }

    /* ==========================================
       MEDIA QUERIES - OPTIMIZACIÓN RESPONSIVA
       ========================================== */
    @media (max-width: 600px) {
      body {
        padding: 10px;
      }

      .card {
        padding: 20px 15px;
        border-radius: 8px;
      }

      h2 {
        font-size: 19px;
      }

      .header-bar {
        flex-direction: column;
        align-items: flex-start;
        gap: 15px;
        padding: 15px;
      }

      .header-actions {
        width: 100%;
        flex-direction: column;
        gap: 10px;
      }

      .header-actions button {
        width: 100%;
        padding: 12px;
      }

      .input-group-search {
        flex-direction: column;
      }
      .input-group-search button {
        width: 100% !important;
      }
    }
  </style>
</head>
<body>

<div class="logo-container">
  <img src="https://i.ibb.co/kgpG36nw/Logo-Net-Uno-RIF.png" alt="Logo-Net-Uno-RIF" border="0">
</div>

<div class="container">
  <div id="loginView" class="card">
    <h2>Sistema de Registro ONT</h2>
    <form id="loginForm" onsubmit="iniciarSesion(event)">
      <div class="form-group">
        <label>Usuario</label>
        <select id="userLogin" required>
          <option value="">Seleccione su rol...</option>
          <option value="admin">Administrador</option>
          <option value="contratista">Contratista</option>
          <option value="sac">SAC</option>
          <option value="operaciones">Operaciones</option>
        </select>
      </div>
      <div class="form-group">
        <label>Contraseña</label>
        <input type="password" id="passLogin" placeholder="Ingrese su clave" required>
      </div>
      <button type="submit">Ingresar al Sistema</button>
      <div id="msgLogin" style="color: var(--error); margin-top: 12px; text-align: center; font-size: 14px;"></div>
    </form>
  </div>

  <div id="dashboardView" class="hidden">
    <div class="header-bar card">
      <div>
        <strong style="color: var(--primary);">Usuario: </strong><span id="displayUser"></span>
      </div>
      <div class="header-actions">
        <button id="btnDescargar" class="btn-success hidden" onclick="descargarReporte()">Descargar CSV</button>
        <button class="btn-small" onclick="cerrarSesion()">Cerrar Sesión</button>
      </div>
    </div>

    <div id="mensaje"></div>

    <div id="moduloRegistro" class="card hidden">
      <h2>Registro de ONT Recuperada</h2>
      <form id="registroForm" onsubmit="registrarEquipo(event)">
        <h3>Datos del cliente</h3>
        <div class="form-group">
          <label>Cédula del cliente</label>
          <div class="input-group">
            <select id="tipoCedula">
              <option value="V-">V-</option>
              <option value="E-">E-</option>
              <option value="J-">J-</option>
            </select>
            <input type="number" id="cedula" placeholder="Ej: 29527118" required>
          </div>
        </div>

        <h3>Datos del equipo</h3>
        <div class="form-group">
          <label>Serial del equipo (Obligatorio en Mayúsculas)</label>
          <input type="text" id="serialRegistro" placeholder="Ej: ALCLB1234567" pattern="^[A-Z0-9]+$" title="Solo se permiten letras mayúsculas y números, sin espacios" required oninput="this.value = this.value.toUpperCase().replace(/\s/g, '')" onblur="verificarSerialDuplicado()">
          <small id="serialWarning" style="color: var(--error); display: none; margin-top: 6px; font-size: 13px;">Este serial ya está registrado en el sistema.</small>
        </div>
        
        <!-- Campo de modelo ajustado a Select C/W y S/W -->
        <div class="form-group">
          <label>Modelo del equipo</label>
          <select id="modeloRegistro" required>
            <option value="C/W">C/W</option>
            <option value="S/W">S/W</option>
          </select>
        </div>
        
        <div class="form-group">
          <label>Operadora / Nodo</label>
          <select id="operadora" required>
            <option value="Maracay">Maracay</option>
            <option value="La Morita">La Morita</option>
            <option value="Turmero">Turmero</option>
            <option value="La Victoria">La Victoria</option>
            <option value="Samanes">Samanes</option>
            <option value="Palo Negro">Palo Negro</option>
          </select>
        </div>
        <div class="form-group">
          <label>Recuperado por</label>
          <select id="recuperadoPor" required>
            <option value="Oficina">OFICINA</option>
            <option value="INVERSIONES MAYO">INVERSIONES MAYO</option>
            <option value="SERVICIOS APACHE TECNOLOGY CA">SERVICIOS APACHE TECNOLOGY CA</option>
            <option value="TELNETWORK">TELNETWORK</option>
            <option value="4TECH">4TECH</option>
            <option value="CONEXSAL">CONEXSAL C.A</option>
            <option value="INVERSIONES SUMISERVICE C.A">INVERSIONES SUMISERVICE C.A</option>
            <option value="GRUB TECHNOLOGY">GRUB TECHNOLOGY</option>
            <option value="I.Y TECNISERVICIOS C.A">I.Y TECNISERVICIOS C.A</option>
            <option value="INVERSIONES CYS 2014 C.A">INVERSIONES CYS 2014 C.A</option>
            <option value="TECNISOLUCIONES">TECNISOLUCIONES</option>
            <option value="EMPRENDIMIENTO JOSE">EMPRENDIMIENTO JOSE</option>
            <option value="ORLANDO EZEQUIEL CALANCHE ROJAS, FP">ORLANDO EZEQUIEL CALANCHE ROJAS, FP</option>
            <option value="PROYECTA C.A">PROYECTA C.A</option>
            <option value="PROYECTOS Y SOLUCIONES DT C.A">PROYECTOS Y SOLUCIONES DT C.A</option>
            <option value="TELECOMUNICACIONES J.M CORDERO FP">TELECOMUNICACIONES J.M CORDERO FP</option>
            <option value="FIBRATEC GM C.A">FIBRATEC GM C.A</option>
            <option value="RJC SERV 2024 C.A">RJC SERV 2024 C.A</option>
            <option value="TELEFIBRAS C.A">TELEFIBRAS C.A</option>
            <option value="EMM SERVICES 2024 C.A">EMM SERVICES 2024 C.A</option>
            <option value="CONSTRUTELS J.A.V C.A">CONSTRUTELS J.A.V C.A</option>
            <option value="NERJENOR C.A">NERJENOR C.A</option>
            <option value="MULTISERVICIOS MJ C.A">MULTISERVICIOS M&J C.A</option>
            <option value="DISTRIBUIDORA ZM">DISTRIBUIDORA ZM</option>
            <option value="VALERIA">VALERIA</option>
            <option value="MENDOZA">MENDOZA</option>
            <option value="PEDRO CORDOVA">PEDRO CORDOVA</option>
            <option value="ALBERTO BARBER">ALBERTO BARBER</option>
            <option value="EMMANUEL LUGO">EMMANUEL LUGO</option>
            <option value="ANTONI CORTEZ">ANTONI CORTEZ</option>
            <option value="VICENTE FIGUEREDO">VICENTE FIGUEREDO</option>
            <option value="JULIO LOPEZ">JULIO LOPEZ</option>
            <option value="DANIEL PAEZ">DANIEL PAEZ</option>
            <option value="EDWIN ESPINOZA">EDWIN ESPINOZA</option>
            <option value="FRANCISCO TORRES">FRANCISCO TORRES</option>
            <option value="JESUS CASTILLO">JESUS CASTILLO</option>
            <option value="JORGE ACOSTA">JORGE ACOSTA</option>
            <option value="LUIS CALDERON">LUIS CALDERON</option>
            <option value="LUIS MORALES">LUIS MORALES</option>
            <option value="LUIS RAMON">LUIS RAMOS</option>
            <option value="SIMON LOPEZ">VALERIA</option>
            <option value="WILMER MOLINA">WILMER MOLINA</option>
          </select>
        </div>
        
        <button type="submit" id="btnGuardar">Guardar Registro</button>
      </form>
    </div>

    <div id="moduloOperaciones" class="card hidden">
      <h2>Actualizar Status de Equipo</h2>
      <div class="form-group">
        <label>Buscar por Serial</label>
        <div class="input-group input-group-search">
          <input type="text" id="searchSerial" placeholder="Ingrese serial de la ONT" oninput="this.value = this.value.toUpperCase().replace(/\s/g, '')">
          <button style="width: 120px;" onclick="buscarSerial()" id="btnBuscar">Buscar</button>
        </div>
      </div>

      <form id="actualizarForm" class="hidden" onsubmit="actualizarStatus(event)">
        <hr style="border:0; border-top:1px solid var(--border); margin: 20px 0;">
        <div class="form-group">
          <label>Status del equipo</label>
          <select id="statusEquipo" required>
            <option value="Bueno">Bueno</option>
            <option value="Malo">Malo</option>
          </select>
        </div>
        <div class="form-group">
          <label>Observación Técnica</label>
          <textarea id="observacionEquipo" rows="3" placeholder="Detalles de la revisión..."></textarea>
        </div>
        
        <!-- Nuevos campos para operaciones -->
        <div class="form-group">
          <label>Potencia</label>
          <input type="text" id="potencia" placeholder="Ej: -23.5 dBm" required>
        </div>
        <div class="form-group">
          <label>¿Posee caja?</label>
          <select id="caja" required>
            <option value="Si">Sí</option>
            <option value="No">No</option>
          </select>
        </div>
        <div class="form-group">
          <label>¿Posee fuente de poder?</label>
          <select id="fuente" required>
            <option value="Si">Sí</option>
            <option value="No">No</option>
          </select>
        </div>
        <!-- Fin nuevos campos -->
        
        <button type="submit" id="btnActualizar">Actualizar Status</button>
      </form>
    </div>
  </div>
</div>

<script>
  // ========================================================
  // RECUERDA COLOCAR AQUÍ LA URL GENERADA POR GOOGLE APP SCRIPT
  // ========================================================
  const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyhy3DynrsBq1Oh7KKshoPJugkHKYogsxqmqHh6wNqOIMqThiRkJ0uRm2G23UBCqTLtHg/exec"; 
  
  let rolActual = "";
  const credenciales = { "admin": "adminnetuno", "contratista": "contratista", "sac": "sacnetuno", "operaciones": "operacionesnetuno" };

  async function peticionBackend(accion, parametros = {}) {
    const response = await fetch(WEB_APP_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({ action: accion, ...parametros })
    });
    const result = await response.json();
    if (!result.success) throw new Error(result.error);
    return result.data;
  }

  function mostrarMensaje(texto, tipo) {
    const div = document.getElementById('mensaje');
    div.textContent = texto;
    div.className = tipo;
    window.scrollTo({ top: 0, behavior: 'smooth' }); 
    setTimeout(() => { div.className = ""; div.textContent = ""; }, 6000);
  }

  function iniciarSesion(e) {
    e.preventDefault();
    const user = document.getElementById('userLogin').value;
    const pass = document.getElementById('passLogin').value;
    const msgDiv = document.getElementById('msgLogin');
    
    if (credenciales[user] !== pass) { msgDiv.textContent = "Contraseña incorrecta."; return; }

    msgDiv.textContent = ""; rolActual = user;
    document.getElementById('loginView').classList.add('hidden');
    document.getElementById('dashboardView').classList.remove('hidden');
    document.getElementById('displayUser').textContent = user.toUpperCase();
    document.getElementById('moduloRegistro').classList.add('hidden');
    document.getElementById('moduloOperaciones').classList.add('hidden');
    document.getElementById('btnDescargar').classList.add('hidden');
    document.getElementById('actualizarForm').classList.add('hidden');

    if (user === 'admin') {
      document.getElementById('moduloRegistro').classList.remove('hidden');
      document.getElementById('moduloOperaciones').classList.remove('hidden');
      document.getElementById('btnDescargar').classList.remove('hidden');
    } else if (user === 'contratista' || user === 'sac') {
      document.getElementById('moduloRegistro').classList.remove('hidden');
    } else if (user === 'operaciones') {
      document.getElementById('moduloOperaciones').classList.remove('hidden');
    }
  }

  function cerrarSesion() {
    rolActual = "";
    document.getElementById('loginForm').reset();
    document.getElementById('dashboardView').classList.add('hidden');
    document.getElementById('loginView').classList.remove('hidden');
  }

  async function verificarSerialDuplicado() {
    const serialInput = document.getElementById('serialRegistro').value.trim().toUpperCase();
    const btnGuardar = document.getElementById('btnGuardar');
    const warningLabel = document.getElementById('serialWarning');

    if (!serialInput) return;

    try {
      const existe = await peticionBackend('verificarSerial', { serial: serialInput });
      if (existe) {
        warningLabel.style.display = "block";
        btnGuardar.disabled = true;
        document.getElementById('serialRegistro').style.borderColor = "var(--error)";
      } else {
        warningLabel.style.display = "none";
        btnGuardar.disabled = false;
        document.getElementById('serialRegistro').style.borderColor = "var(--border)";
      }
    } catch (error) {
      console.error("Error verificando serial:", error);
    }
  }

  async function registrarEquipo(e) {
    e.preventDefault();
    let serialInput = document.getElementById('serialRegistro').value;
    
    if (/[a-z\s]/.test(serialInput)) { 
      mostrarMensaje("El serial solo puede contener mayúsculas y no debe tener espacios.", "error"); 
      return; 
    }

    const btn = document.getElementById('btnGuardar');
    btn.disabled = true; btn.textContent = "Procesando...";

    const datos = {
      cedula: document.getElementById('tipoCedula').value + document.getElementById('cedula').value,
      serial: serialInput,
      modelo: document.getElementById('modeloRegistro').value,
      operadora: document.getElementById('operadora').value,
      recuperadoPor: document.getElementById('recuperadoPor').value,
      status: "Pendiente revisión", observacion: "", registradoPor: rolActual
    };

    try {
      await peticionBackend('registrarONT', { datos: datos });
      mostrarMensaje("ONT registrada con éxito.", "success");
      document.getElementById('registroForm').reset();
    } catch (error) {
      mostrarMensaje(error.message || "Error al registrar", "error");
    } finally {
      btn.disabled = false; btn.textContent = "Guardar Registro";
    }
  }

  async function buscarSerial() {
    const serial = document.getElementById('searchSerial').value.trim().toUpperCase();
    if(!serial) return;

    const btn = document.getElementById('btnBuscar');
    btn.disabled = true; btn.textContent = "...";

    try {
      const resultado = await peticionBackend('buscarONT', { serial: serial });
      if (resultado) {
        document.getElementById('actualizarForm').classList.remove('hidden');
        
        if(resultado.status && resultado.status !== "Pendiente revisión") {
          document.getElementById('statusEquipo').value = resultado.status;
        }
        document.getElementById('observacionEquipo').value = resultado.observacion || "";
        
        // Autocompletar datos nuevos si el backend ya los envía
        document.getElementById('potencia').value = resultado.potencia || "";
        if (resultado.caja) document.getElementById('caja').value = resultado.caja;
        if (resultado.fuente) document.getElementById('fuente').value = resultado.fuente;

        mostrarMensaje("Equipo encontrado.", "success");
      } else {
        document.getElementById('actualizarForm').classList.add('hidden');
        mostrarMensaje("Serial no encontrado.", "error");
      }
    } catch (error) {
      mostrarMensaje("Error de conexión al buscar.", "error");
    } finally {
      btn.disabled = false; btn.textContent = "Buscar";
    }
  }

  async function actualizarStatus(e) {
    e.preventDefault();
    const btn = document.getElementById('btnActualizar');
    btn.disabled = true; btn.textContent = "Actualizando...";

    const serial = document.getElementById('searchSerial').value.trim().toUpperCase();
    const status = document.getElementById('statusEquipo').value;
    const obs = document.getElementById('observacionEquipo').value;
    
    // Captura de los nuevos campos agregados
    const potencia = document.getElementById('potencia').value;
    const caja = document.getElementById('caja').value;
    const fuente = document.getElementById('fuente').value;

    try {
      // Se envían al backend
      await peticionBackend('actualizarStatus', { 
        serial, 
        status, 
        observacion: obs, 
        potencia, 
        caja, 
        fuente 
      });
      
      mostrarMensaje("Status actualizado correctamente.", "success");
      document.getElementById('actualizarForm').classList.add('hidden');
      document.getElementById('searchSerial').value = "";
      
      // Reseteamos el formulario de actualización
      document.getElementById('actualizarForm').reset();
    } catch (error) {
      mostrarMensaje("Error al actualizar la base de datos.", "error");
    } finally {
      btn.disabled = false; btn.textContent = "Actualizar Status";
    }
  }

  async function descargarReporte() {
    mostrarMensaje("Generando reporte CSV...", "success");
    try {
      const csvData = await peticionBackend('generarCSV');
      const blob = new Blob([new Uint8Array([0xEF, 0xBB, 0xBF]), csvData], { type: "text/csv;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `Reporte_ONTs_${new Date().toISOString().split('T')[0]}.csv`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
    } catch (error) {
      mostrarMensaje("Error al generar el reporte", "error");
    }
  }
</script>

</body>
</html>
